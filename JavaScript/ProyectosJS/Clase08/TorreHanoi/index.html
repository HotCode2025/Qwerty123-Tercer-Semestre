<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Las Torres de Hanoi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-aplicacion">
        <h1 id="titulo">⛩️ Las Torres de Hanoi</h1>
    </header>

    <div class="contenedor-controles">
        <label>Cantidad de Discos (N):</label>
        <input type="number" id="valorN" min="3" max="7" value="4">
        <button onclick="iniciar()">Resolver Acertijo</button>
    </div>

    <div id="escenario-hanoi">
        <div class="varilla-contenedor" id="varilla-A">
            <div class="eje-varilla"></div>
            <div class="base-varilla">A</div>
            <div class="area-discos"></div>
        </div>
        <div class="varilla-contenedor" id="varilla-B">
            <div class="eje-varilla"></div>
            <div class="base-varilla">B</div>
            <div class="area-discos"></div>
        </div>
        <div class="varilla-contenedor" id="varilla-C">
            <div class="eje-varilla"></div>
            <div class="base-varilla">C</div>
            <div class="area-discos"></div>
        </div>
    </div>

    <div id="resultado"></div>

    <script src="script.js"></script>
</body>
</html>
